version: '3.8'

services:
  radar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Optional: Mount data directory for aircraft database
    # volumes:
    #   - ./server/src/Data:/app/Data:ro

  nginx:
    image: nginx:alpine
    container_name: radar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - radar
    restart: unless-stopped

